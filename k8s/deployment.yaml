apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-python-rest
  namespace: apps
  labels:
    app: sample-python-rest

spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-python-rest
  template:
    metadata:
      labels:
        app: sample-python-rest
    spec:
      containers:
      - name: sample-python-rest
        image: estebancc/sample-python-rest:v1
        ports:
        - containerPort: 8081
        livenessProbe:
          httpGet:
            path: /sample-python-rest/health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /sample-python-rest/health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10